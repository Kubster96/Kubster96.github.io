<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Strona główna – wybierz: Szkoła Języków Obcych 8 Plus lub Checklista oględzin Škoda Superb">
  <title>Wybierz stronę</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#123273; --navy-d:#0C2E59; --red:#D91A1A;
      --ink:#16191D; --paper:#F2EFE9; --green:#15573C;
    }
    *{box-sizing:border-box}
    body{
      margin:0; min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:2rem; padding:2rem 1rem;
      font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
      color:#fff; background:linear-gradient(135deg,#0C2E59 0%,#16191D 100%);
    }
    h1{
      font-family:Oswald,sans-serif; font-weight:700; letter-spacing:.04em;
      text-transform:uppercase; font-size:clamp(1.5rem,5vw,2.25rem); margin:0; text-align:center;
    }
    .cards{
      display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:1.25rem; width:100%; max-width:760px;
    }
    .card{
      display:flex; flex-direction:column; gap:.5rem;
      padding:1.75rem; border-radius:16px; text-decoration:none; color:#fff;
      background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.12);
      transition:transform .15s ease, background .15s ease, border-color .15s ease;
    }
    .card:hover{ transform:translateY(-4px); background:rgba(255,255,255,.1); }
    .card .tag{
      font-family:Oswald,sans-serif; letter-spacing:.18em; text-transform:uppercase;
      font-size:.75rem; font-weight:600;
    }
    .card .title{ font-size:1.5rem; font-weight:700; }
    .card .desc{ color:rgba(255,255,255,.72); font-size:.95rem; line-height:1.5; }
    .card .go{
      margin-top:.75rem; align-self:flex-start; font-weight:600; font-size:.9rem;
      padding:.55rem 1.1rem; border-radius:999px; background:#fff; color:var(--ink);
    }
    .card.c-8plus{ border-color:rgba(217,26,26,.35); }
    .card.c-8plus .tag{ color:#FF8A8A; }
    .card.c-8plus .go{ background:var(--red); color:#fff; }
    .card.c-skoda{ border-color:rgba(21,87,60,.5); }
    .card.c-skoda .tag{ color:#7FC4A3; }
    .card.c-skoda .go{ background:var(--green); color:#fff; }
    footer{ color:rgba(255,255,255,.45); font-size:.8rem; }
  </style>
</head>
<body>
  <h1>Wybierz stronę</h1>

  <div class="cards">
    <a class="card c-8plus" href="8plus/">
      <span class="tag">Szkoła Języków Obcych</span>
      <span class="title">8 PLUS</span>
      <span class="desc">Kursy języka angielskiego i niemieckiego w Sanoku, przygotowanie do egzaminów Cambridge.</span>
      <span class="go">Otwórz →</span>
    </a>

    <a class="card c-skoda" href="skoda/">
      <span class="tag">Checklista oględzin</span>
      <span class="title">Škoda Superb</span>
      <span class="desc">Lista kontrolna do oględzin samochodu na miejscu – punkty do sprawdzenia przed zakupem.</span>
      <span class="go">Otwórz →</span>
    </a>
  </div>

  <footer>kubster96.github.io</footer>
</body>
</html>
